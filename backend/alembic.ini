# Alembic configuration file — DO NOT commit real DB credentials here.
# The script_location uses the relative path from where `alembic` CLI is run.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# `sqlalchemy.url` is intentionally left blank — env.py reads it from Settings.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
